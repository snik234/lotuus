{% extends 'base.html' %}

{% block content %}

{% if messages %}
    <div class="toast-container">
        {% for message in messages %}
            <div class="toast-message animate-toast">
                <span>✅ {{ message }}</span>
            </div>
        {% endfor %}
    </div>
{% endif %}

<div class="test-drive-container">
    <div class="test-drive-card">
        <h1>BOOK A TEST DRIVE</h1>
        <p class="subtitle">Відчуйте чистокровну ДНК Lotus на гоночном треке або вулицях города</p>
        
        <form method="post" class="test-drive-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Оберіть модель Lotus</label>
                <select name="car_title" required>
                    <option value="" disabled selected>Фільтрація</option>
                    {% for car in cars %}
                        <option value="{{ car.title }}">{{ car.title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Дата поїздки</label>
                    <input type="date" name="date" required id="testDriveDate">
                </div>
                <div class="form-group">
                    <label>Зручний час</label>
                    <input type="time" name="time" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Ваше і'мя</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" name="phone" placeholder="+380..." required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Забронювати час</button>
        </form>
    </div>
</div>

<style>
    .test-drive-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 40px 20px;
    }
    .test-drive-card {
        background: #141414;
        border: 1px solid #2b2b2b;
        padding: 50px 40px;
        border-radius: 16px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        font-family: sans-serif;
    }
    .test-drive-card h1 {
        color: white;
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 10px;
        letter-spacing: 1px;
        text-align: center;
    }
    .test-drive-card .subtitle {
        color: #888;
        font-size: 14px;
        text-align: center;
        margin-bottom: 40px;
        line-height: 1.5;
    }
    .test-drive-form { display: flex; flex-direction: column; gap: 25px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { color: #aaa; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .test-drive-form input, .test-drive-form select {
        background: #1d1d1d;
        border: 1px solid #333;
        color: white;
        padding: 14px;
        border-radius: 8px;
        outline: none;
        font-size: 15px;
        transition: border-color 0.3s ease;
    }
    .test-drive-form input:focus, .test-drive-form select:focus { border-color: #fdd835; }
    
    /* Стилизация календаря и выпадающего списка */
    .test-drive-form input[type="date"]::-webkit-calendar-picker-indicator,
    .test-drive-form input[type="time"]::-webkit-calendar-picker-indicator {
        filter: invert(1); /* Делает иконку календаря белой */
        cursor: pointer;
    }

    .submit-btn {
        background: #fdd835;
        color: black;
        border: none;
        padding: 16px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 10px;
        transition: background 0.3s ease;
    }
    .submit-btn:hover { background: #ffeb3b; box-shadow: 0 5px 15px rgba(253, 216, 53, 0.25); }

    /* Всплывашка успеха */
    .toast-container { position: fixed; top: 30px; right: 30px; z-index: 9999; }
    .toast-message { background: #141414; color: #fff; border-left: 4px solid #fdd835; padding: 15px 25px; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 600; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .animate-toast { animation: slideIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
</style>

<script>
    const today = new Date().toISOString().split('T')[0];
    const dateInput = document.getElementById('testDriveDate');
    if (dateInput) {
        dateInput.setAttribute('min', today);
    }

    setTimeout(() => {
        const toast = document.querySelector('.toast-container');
        if (toast) {
            toast.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(() => toast.remove(), 500); // Полностью удаляем из HTML-структуры
        }
    }, 4000);
</script>

{% endblock %}
